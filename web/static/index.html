<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Strategy Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <h1>Quant Strategy</h1>
  <p class="subtitle">AMA + SMFI + DSMO</p>

  <div class="control-group">
    <label for="ticker-select">Primary Ticker</label>
    <select id="ticker-select"></select>
  </div>

  <div class="control-group">
    <label for="bars-select">Display Bars</label>
    <select id="bars-select">
      <option value="30">30</option>
      <option value="60" selected>60</option>
      <option value="90">90</option>
      <option value="120">120</option>
      <option value="180">180</option>
      <option value="250">250</option>
    </select>
  </div>

  <div class="control-group">
    <label for="period-select">Data Depth</label>
    <select id="period-select">
      <option value="3mo" selected>3 months</option>
      <option value="6mo">6 months</option>
      <option value="1y">1 year</option>
      <option value="2y">2 years</option>
    </select>
  </div>

  <div class="control-group">
    <label for="refresh-select">Auto-Refresh</label>
    <select id="refresh-select">
      <option value="0">Off</option>
      <option value="60">1 min</option>
      <option value="300" selected>5 min</option>
      <option value="900">15 min</option>
    </select>
  </div>

  <button id="refresh-btn">Refresh Now</button>

  <div class="divider"></div>
  <h3>Quick View</h3>
  <div id="quick-view"></div>

  <div class="divider"></div>
  <h3>Positions</h3>
  <div id="positions-panel"></div>
</aside>

<!-- Main -->
<main id="main">
  <!-- Candlestick chart -->
  <div id="chart-price" class="chart-container"></div>
  <!-- Indicator chart -->
  <div id="chart-indicator" class="chart-container"></div>
  <!-- Metrics -->
  <div id="metrics-row" class="metrics-row"></div>
  <!-- Signal cards -->
  <div id="signal-cards" class="signal-cards"></div>
  <div id="status-bar"></div>
</main>

<script src="/static/app.js"></script>
</body>
</html>
