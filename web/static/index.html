<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Strategy Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
</head>
<body>

<div id="grid-bg"></div>
<div id="noise-overlay"></div>

<!-- Top Bar -->
<header id="top-bar">
  <div class="tb-left">
    <span class="logo">Q<span class="logo-accent">/</span>S</span>
    <span class="tb-title">quant strategy</span>
  </div>
  <div id="status-bar" class="tb-center"></div>
  <div class="tb-right">
    <button id="toggle-cards-btn" class="tb-toggle" title="Show/Hide Ticker Cards">Cards</button>
    <div id="update-pulse" class="pulse-dot"></div>
    <span id="update-time" class="tb-time"></span>
  </div>
</header>

<div id="app-shell">
<!-- Sidebar -->
<aside id="sidebar">
  <div class="sb-brand">
    <h1>Quant<span class="brand-accent">Strategy</span></h1>
    <p class="subtitle">AMA &middot; SMFI &middot; DSMO</p>
  </div>

  <div class="control-group">
    <label for="ticker-select">Primary Ticker</label>
    <select id="ticker-select"></select>
  </div>

  <div class="control-group">
    <label for="bars-select">Display Bars</label>
    <select id="bars-select">
      <option value="30">30</option>
      <option value="60" selected>60</option>
      <option value="90">90</option>
      <option value="120">120</option>
      <option value="180">180</option>
      <option value="250">250</option>
    </select>
  </div>

  <div class="control-group">
    <label for="refresh-select">Auto-Refresh</label>
    <select id="refresh-select">
      <option value="0">Off</option>
      <option value="60">1 min</option>
      <option value="300" selected>5 min</option>
      <option value="900">15 min</option>
    </select>
  </div>

  <button id="refresh-btn">Refresh Now</button>

  <div class="divider"></div>
  <h3>Quick View</h3>
  <div id="quick-view"></div>

  <div class="divider"></div>
  <h3>Positions</h3>
  <div id="positions-panel"></div>
</aside>

<!-- Main -->
<main id="main">
  <section id="chart-area">
    <div id="chart-price" class="chart-container"></div>
  </section>
  <div id="metrics-row" class="metrics-row"></div>
  <div id="signal-cards" class="signal-cards"></div>
</main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
