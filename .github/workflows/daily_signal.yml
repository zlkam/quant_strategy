name: Daily Quant Signal Report

on:
  schedule:
    # Mon-Fri at 07:00 UTC
    # Runs after Yahoo Finance data is updated (~midnight UTC) and delivers
    - cron: "0 7 * * 1-5"
  workflow_dispatch:  # allow manual trigger

jobs:
  daily-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run daily signal script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python automation/daily_signal.py

      - name: Upload daily run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-log
          path: logs/daily_runs/
          retention-days: 30
